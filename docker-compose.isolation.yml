# Isolation sandbox — ONLY Elasticsearch + Kafka, nothing else.
#
# Use this to poke each subsystem on its own (no SFTP, no app, no UIs) while
# bootstrapping or debugging es_extract / the Kafka consumer:
#   up:    docker compose -f docker-compose.isolation.yml up -d
#   logs:  docker compose -f docker-compose.isolation.yml logs -f
#   down:  docker compose -f docker-compose.isolation.yml down -v
#
# NOTE: this binds the SAME host ports (9200, 9092) as the full
# docker-compose.yml, so run ONE stack at a time. The project name and
# container names are distinct so the two stacks never share state.
name: etl-sandbox

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: sandbox-elasticsearch
    ports:
      - "9200:9200"
    environment:
      discovery.type: "single-node"
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 30

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: sandbox-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft mode (no ZooKeeper). CLUSTER_ID is a base64-encoded 16-byte UUID.
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      # Auto-create topics so the sandbox scripts can produce to a fresh topic
      # without an explicit `kafka-topics --create`.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
