# Local mock environment for the ETL pipeline.
# Brings up Kafka (KRaft, no Zookeeper), Elasticsearch (single-node, security off),
# and an SFTP server with key-only auth.
# Bring up:    ./scripts/setup_local.sh
# Tear down:   ./scripts/teardown_local.sh

services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: etl-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft requires a base64-encoded 16-byte UUID, not a free-form string.
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: etl-elasticsearch
    ports:
      - "9200:9200"
    environment:
      discovery.type: "single-node"
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 30

  sftp:
    image: atmoz/sftp:alpine
    container_name: etl-sftp
    ports:
      - "2222:22"
    # `etl::1001` = user "etl", no password (key-only), uid 1001.
    command: etl::1001
    volumes:
      # Persistent host keys so known_hosts stays valid across restarts.
      - ./local/sftp/ssh_host_keys:/etc/ssh/keys:ro
      # Authorized public key for the etl user (generated by setup_local.sh).
      - ./local/sftp/etl_authorized_keys:/home/etl/.ssh/keys/authorized_keys:ro
      # Bind-mounted upload destination so you can inspect what the ETL wrote.
      - ./local/sftp/upload:/home/etl/upload

  # Optional UIs; start both with: docker compose --profile ui up -d
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: etl-kibana
    profiles: ["ui"]
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: "http://elasticsearch:9200"
    depends_on:
      elasticsearch:
        condition: service_healthy

  # Kafka UI on 8090 (8080 is taken by Airflow on this machine).
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: etl-kafka-ui
    profiles: ["ui"]
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "local"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy
